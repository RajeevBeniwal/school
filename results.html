<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>Results – Govt. Girls High School Kagdana</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .result-search-box{background:#fff;border-radius:var(--rad-lg);box-shadow:var(--shadow-lg);padding:40px;max-width:560px;margin:0 auto 52px;border-top:5px solid var(--gold)}
    .result-search-box h2{font-family:'Playfair Display',serif;font-size:1.9rem;color:var(--teal);text-align:center;margin-bottom:6px}
    .result-search-box .hint{text-align:center;color:var(--muted);font-size:.85rem;margin-bottom:28px}
    .rc-wrap{max-width:820px;margin:0 auto}
    .rc-head{background:linear-gradient(135deg,var(--teal-dk),var(--teal));color:#fff;padding:28px 32px;border-radius:var(--rad) var(--rad) 0 0}
    .rc-school{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--gold-lt);margin-bottom:2px;text-align:center}
    .rc-addr{font-size:.72rem;color:rgba(255,255,255,.5);text-align:center;margin-bottom:14px}
    .rc-exam{font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.5);text-align:center;margin-bottom:4px}
    .rc-student-name{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:800}
    .rc-meta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;margin-top:18px}
    .rc-meta-item{background:rgba(255,255,255,.1);border-radius:8px;padding:10px 14px;border:1px solid rgba(255,255,255,.1)}
    .rc-meta-item .lbl{font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:3px}
    .rc-meta-item .val{font-size:.9rem;font-weight:600}
    .rc-body{background:#fff;padding:28px 32px}
    .rc-footer{background:#fff;padding:14px 32px 28px;border-top:1px dashed var(--border);display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px;font-size:.74rem;color:var(--muted);border-radius:0 0 var(--rad) var(--rad)}
    .sig-block{text-align:center}.sig-line{width:110px;height:1px;background:var(--ink-lt);margin:0 auto 4px}.sig-lbl{font-size:.7rem;color:var(--muted)}
    .result-summary-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-top:22px}
    .rs-box{background:var(--gold-xpale);border-radius:var(--rad-sm);padding:14px;text-align:center;border:1px solid rgba(200,150,12,.15)}
    .rs-val{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:800;color:var(--teal)}
    .rs-lbl{font-size:.66rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-top:3px}
    .pass-box{background:#e8f8ee;border-color:#27ae60}.pass-box .rs-val{color:#145a32}
    .fail-box{background:#fde8e8;border-color:#c0392b}.fail-box .rs-val{color:#7a0f0f}
    .grade-scale-bar{background:var(--gold-xpale);border:1px solid rgba(200,150,12,.2);border-radius:var(--rad-sm);padding:10px 14px;margin-top:14px;font-size:.74rem;color:var(--ink-lt);line-height:1.8}
    .grade-scale-bar strong{color:var(--teal);font-size:.74rem;text-transform:uppercase;letter-spacing:.06em}
    .download-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
    .download-bar h3{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--teal);flex:1}
    .cls-chips{display:flex;gap:8px;flex-wrap:wrap}
    .cls-chip{padding:6px 16px;border-radius:99px;border:2px solid var(--teal);font-size:.74rem;font-weight:700;font-family:'Poppins',sans-serif;cursor:pointer;color:var(--teal);background:transparent;transition:all var(--ease);text-transform:uppercase;letter-spacing:.04em}
    .cls-chip.active,.cls-chip:hover{background:var(--teal);color:#fff}
  </style>
</head>
<body>
<div class="topbar" id="siteTopbar"></div>
<header class="site-header" id="siteHeader"></header>
<nav class="site-nav" id="siteNav"></nav>
<div class="ticker" id="siteTicker"></div>
<div class="page-hero"><div class="page-hero-inner">
  <div class="breadcrumb"><a href="index.html">Home</a><span>/</span><span>Results</span></div>
  <h1>📊 Annual Examination Results</h1>
  <p>Search by Roll Number or SRN · View &amp; Print A4 Result Card</p>
</div></div>

<main><div class="container">
  <div class="tabs">
    <button class="tab-btn active" data-tab="search">🔍 Search My Result</button>
  </div>

  <!-- TAB: SEARCH -->
  <div class="tab-pane active" id="tab-search">
    <div class="result-search-box">
      <h2>🔍 Find Your Result</h2>
      <p class="hint">Enter your Roll Number or SRN to view and print your result card</p>
      <div class="form-row">
        <div class="form-group"><label>Roll Number / SRN</label><input type="text" class="form-control" id="rollInput" placeholder="e.g. 601 or  706 or SRN"/></div>
        <div class="form-group"><label>Exam Year (optional)</label><select class="form-control" id="yearSel"><option value="">All Years</option></select></div>
      </div>
      <div class="form-group"><label>Class (optional)</label><select class="form-control" id="classSel"><option value="">All Classes</option><option>6</option><option>7</option><option>8</option><option>9</option><option>10</option></select></div>
      <button class="btn btn-teal btn-block btn-lg" onclick="searchResult()">🔍 Search Result</button>
      <div id="searchMsg" class="mt-sm"></div>
    </div>

    <div class="rc-wrap" id="rcWrap" style="display:none">
      <div class="download-bar">
        <h3 id="rcTitle">Result Card</h3>
        <button class="btn btn-gold" id="btnPrint">🖨️ Print / Download A4</button>
        <button class="btn btn-outline" onclick="closeResult()">✕ Close</button>
      </div>
      <div id="rcCard" style="border-radius:var(--rad);overflow:hidden;box-shadow:var(--shadow-lg)"></div>
    </div>
  </div>

  <!-- TAB: CLASS-WISE -->
  <div class="tab-pane" id="tab-classwise">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:14px">
      <div class="cls-chips" id="clsChips"></div>
      <input type="text" class="form-control" id="cwSearch" placeholder="🔍 Search name, SRN or roll…" style="max-width:260px" oninput="renderCW()"/>
    </div>
    <div id="cwTable"></div>
  </div>
</div></main>

<footer id="siteFooter"></footer>
<script src="datastore.js"></script><script src="layout.js"></script><script src="common.js"></script>
<script>
document.querySelectorAll('.tab-btn').forEach(function(b){
  b.addEventListener('click',function(){
    document.querySelectorAll('.tab-btn').forEach(function(x){x.classList.remove('active');});
    document.querySelectorAll('.tab-pane').forEach(function(x){x.classList.remove('active');});
    b.classList.add('active');
    document.getElementById('tab-'+b.dataset.tab).classList.add('active');
    if(b.dataset.tab==='classwise')initCW();
  });
});

var results=[];
var currentStudent=null;

(async function(){
  await DataStore.load(); initTicker();
  results=DataStore.get('results');
  // populate year
  var years=[...new Set(results.map(function(r){return r.year;}).filter(Boolean))].sort().reverse();
  var sel=document.getElementById('yearSel');
  years.forEach(function(y){var o=document.createElement('option');o.value=y;o.textContent=y;sel.appendChild(o);});
})();

function searchResult(){
  var roll=document.getElementById('rollInput').value.trim();
  var year=document.getElementById('yearSel').value;
  var cls=document.getElementById('classSel').value;
  var msgEl=document.getElementById('searchMsg');
  if(!roll){msgEl.innerHTML='<div class="alert alert-warning">⚠️ Please enter a Roll Number or SRN.</div>';return;}
  var found=results.filter(function(r){return String(r.rollNo).trim().toLowerCase()===roll.toLowerCase()||String(r.srn||'').trim().toLowerCase()===roll.toLowerCase();});
  if(year)found=found.filter(function(r){return String(r.year)===year;});
  if(cls)found=found.filter(function(r){return String(r.class)===cls;});
  if(!found.length){msgEl.innerHTML='<div class="alert alert-danger">❌ No result found for <strong>'+roll+'</strong>. Please verify the Roll Number / SRN.</div>';document.getElementById('rcWrap').style.display='none';return;}
  msgEl.innerHTML='';
  currentStudent=found[0];
  renderCard(currentStudent);
}

document.getElementById('rollInput').addEventListener('keyup',function(e){if(e.key==='Enter')searchResult();});

function renderCard(s){
  var subs=s.subjects||{};
  var keys=Object.keys(subs);
  var mx=0,ob=0,fail=0;
  keys.forEach(function(k){var m=Number(subs[k].max||0),o=Number(subs[k].obt||0);mx+=m;ob+=o;if(m&&(o/m)*100<33)fail++;});
  var pct=mx?(ob/mx)*100:0;
  var grd=getGrade(pct);
  var passed=pct>=33&&fail===0;

  document.getElementById('rcTitle').textContent='Result – '+s.name+(s.class?' (Class '+s.class+')':'');
  document.getElementById('rcWrap').style.display='block';
  document.getElementById('rcWrap').scrollIntoView({behavior:'smooth',block:'start'});

  // Wire print button
  document.getElementById('btnPrint').onclick=function(){
    var url='result-print.html?roll='+encodeURIComponent(s.rollNo)+(s.year?'&year='+encodeURIComponent(s.year):'')+(s.class?'&class='+encodeURIComponent(s.class):'');
    window.open(url,'_blank','width=900,height=700,scrollbars=yes');
  };

  document.getElementById('rcCard').innerHTML=
  '<div class="rc-head">'+
    '<div class="rc-school">Govt. Girls High School Kagdana</div>'+
    '<div class="rc-addr">Tehsil Nathusari Chopta, Dist. Sirsa, Haryana – 125110 · gghs4700kagdana@gmail.com</div>'+
    '<div class="rc-exam">Annual Examination Result — '+(s.year||'____')+'</div>'+
    '<div class="rc-student-name">'+s.name+'</div>'+
    '<div class="rc-meta-grid">'+
      '<div class="rc-meta-item"><div class="lbl">Roll No.</div><div class="val">'+(s.rollNo||'—')+'</div></div>'+
      '<div class="rc-meta-item"><div class="lbl">SRN</div><div class="val">'+(s.srn||'—')+'</div></div>'+
      '<div class="rc-meta-item"><div class="lbl">Class</div><div class="val">'+(s.class?'Class '+s.class+(s.section?' – '+s.section:''):'—')+'</div></div>'+
      '<div class="rc-meta-item"><div class="lbl">Date of Birth</div><div class="val">'+fmtDate(s.dob,'long')+'</div></div>'+
      '<div class="rc-meta-item"><div class="lbl">Father\'s Name</div><div class="val">'+(s.fatherName||'—')+'</div></div>'+
      '<div class="rc-meta-item"><div class="lbl">Mother\'s Name</div><div class="val">'+(s.motherName||'—')+'</div></div>'+
    '</div>'+
  '</div>'+
  '<div class="rc-body">'+
    '<div class="tbl-wrap"><table>'+
      '<thead><tr><th>S.No.</th><th>Subject</th><th>Max Marks</th><th>Marks Obtained</th><th>%</th><th>Grade</th><th>Status</th></tr></thead>'+
      '<tbody>'+keys.map(function(k,i){
        var m=Number(subs[k].max||0),o=Number(subs[k].obt||0),sp=m?(o/m)*100:0,sg=getGrade(sp),spas=sp>=33;
        return '<tr><td style="color:var(--muted);font-weight:700">'+(i+1)+'</td><td style="font-weight:700">'+k+'</td><td style="text-align:center">'+m+'</td><td style="text-align:center;font-weight:800;color:var(--teal)">'+o+'</td><td style="text-align:center">'+sp.toFixed(1)+'%</td><td style="text-align:center"><span class="grade '+gradeClass(sg)+'">'+sg+'</span></td><td style="text-align:center;font-weight:700;color:'+(spas?'#117a45':'#7a0f0f')+'">'+(spas?'✅ Pass':'❌ Fail')+'</td></tr>';
      }).join('')+
      '<tr style="background:var(--gold-xpale)"><td colspan="2" style="font-weight:800;color:var(--teal)">GRAND TOTAL</td><td style="text-align:center;font-weight:800">'+mx+'</td><td style="text-align:center;font-weight:800;color:var(--teal)">'+ob+'</td><td style="text-align:center;font-weight:800">'+pct.toFixed(1)+'%</td><td style="text-align:center"><span class="grade '+gradeClass(grd)+'">'+grd+'</span></td><td style="text-align:center;font-weight:800;color:'+(passed?'#117a45':'#7a0f0f')+'">'+(passed?'✅ PASS':'❌ FAIL')+'</td></tr>'+
      '</tbody></table></div>'+
    '<div class="result-summary-row">'+
      '<div class="rs-box"><div class="rs-val">'+ob+'/'+mx+'</div><div class="rs-lbl">Marks</div></div>'+
      '<div class="rs-box"><div class="rs-val">'+pct.toFixed(1)+'%</div><div class="rs-lbl">Percentage</div></div>'+
      '<div class="rs-box"><div class="rs-val"><span class="grade '+gradeClass(grd)+'">'+grd+'</span></div><div class="rs-lbl">Grade</div></div>'+
      '<div class="rs-box '+(passed?'pass-box':'fail-box')+'"><div class="rs-val">'+(passed?'PASS':'FAIL')+'</div><div class="rs-lbl">Result</div></div>'+
      (s.position?'<div class="rs-box"><div class="rs-val">'+s.position+'</div><div class="rs-lbl">Class Rank</div></div>':'')+
    '</div>'+
    '<div class="grade-scale-bar"><strong>Grade Scale:</strong> A1 ≥91% Outstanding · A2 81–90% Excellent · B1 71–80% Very Good · B2 61–70% Good · C1 51–60% Average · C2 41–50% Satisfactory · D 33–40% Pass · E below 33% Fail</div>'+
    (s.remarks?'<div class="alert alert-info" style="margin-top:14px">💬 <strong>Remarks:</strong> '+s.remarks+'</div>':'')+
  '</div>'+
  '<div class="rc-footer">'+
    '<div><div>Printed on: '+new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})+'</div><div style="margin-top:2px">Computer-generated. For discrepancy contact school office.</div></div>'+
    '<div style="display:flex;gap:36px"><div class="sig-block"><div class="sig-line"></div><div class="sig-lbl">Class Teacher</div></div><div class="sig-block"><div class="sig-line"></div><div class="sig-lbl">Headmaster</div></div><div class="sig-block"><div class="sig-line" style="width:70px"></div><div class="sig-lbl">School Seal</div></div></div>'+
  '</div>';
}

function closeResult(){document.getElementById('rcWrap').style.display='none';document.getElementById('rollInput').value='';document.getElementById('searchMsg').innerHTML='';}

// CLASS-WISE
var cwClass='All';
function initCW(){
  var classes=['All',...new Set(results.map(function(r){return r.class;}).filter(Boolean)).values()].sort(function(a,b){return a==='All'?-1:Number(a)-Number(b);});
  var chips=document.getElementById('clsChips');
  chips.innerHTML=classes.map(function(c){return '<button class="cls-chip'+(c===cwClass?' active':'')+'" data-c="'+c+'" onclick="setCW(\''+c+'\')">'+( c==='All'?'All Classes':'Class '+c)+'</button>';}).join('');
  renderCW();
}
function setCW(c){cwClass=c;document.querySelectorAll('.cls-chip').forEach(function(b){b.classList.toggle('active',b.dataset.c===c);});renderCW();}
function renderCW(){
  var q=(document.getElementById('cwSearch')||{value:''}).value.toLowerCase();
  var data=cwClass==='All'?results:results.filter(function(r){return String(r.class)===cwClass;});
  if(q)data=data.filter(function(r){return r.name.toLowerCase().includes(q)||String(r.rollNo).includes(q)||String(r.srn||'').toLowerCase().includes(q);});
  var el=document.getElementById('cwTable');
  if(!data.length){el.innerHTML='<div class="alert alert-info">No records found.</div>';return;}
  el.innerHTML='<div class="tbl-wrap"><table><thead><tr><th>Roll No</th><th>SRN</th><th>Student Name</th><th>Father</th><th>Mother</th><th>DOB</th><th>Class</th><th>Year</th><th>Total</th><th>%</th><th>Grade</th><th>Result</th><th>Print</th></tr></thead><tbody>'+
  data.map(function(s){
    var m=0,o=0;Object.values(s.subjects||{}).forEach(function(v){m+=Number(v.max||0);o+=Number(v.obt||0);});
    var pc=m?(o/m*100):0,g=getGrade(pc),p=pc>=33;
    return '<tr><td><strong>'+s.rollNo+'</strong></td><td>'+(s.srn||'—')+'</td><td style="font-weight:600">'+s.name+'</td><td>'+(s.fatherName||'—')+'</td><td>'+(s.motherName||'—')+'</td><td>'+fmtDate(s.dob,'short')+'</td><td>'+s.class+(s.section?' ('+s.section+')':'')+'</td><td>'+(s.year||'—')+'</td><td style="font-weight:700">'+o+'/'+m+'</td><td style="font-weight:700">'+pc.toFixed(1)+'%</td><td><span class="grade '+gradeClass(g)+'">'+g+'</span></td><td style="font-weight:700;color:'+(p?'#117a45':'#7a0f0f')+'">'+(p?'✅ Pass':'❌ Fail')+'</td><td><button class="btn btn-teal btn-sm" onclick="printDirect(\''+s.rollNo+'\',\''+s.year+'\')">🖨️</button></td></tr>';
  }).join('')+'</tbody></table></div><div style="margin-top:8px;font-size:.75rem;color:var(--muted)">'+data.length+' student(s)</div>';
}
function printDirect(roll,year){
  var url='result-print.html?roll='+encodeURIComponent(roll)+(year?'&year='+encodeURIComponent(year):'');
  window.open(url,'_blank','width=900,height=700,scrollbars=yes');
}
</script>
</body></html>
